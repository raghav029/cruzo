name: cruzo
description: Cruzo — Corporate Car Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # DI
  get_it: ^7.7.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Charts (fleet dashboard only — tree-shaken out of employee/driver builds)
  fl_chart: ^0.69.0

  # Adaptive layout (sidebar for web/tablet, drawer for mobile)
  flutter_adaptive_scaffold: ^0.2.2

  # Utils
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/shared/
    - assets/fleet/
    - assets/employee/
    - assets/driver/
